# .github/workflows/ci.yml — smpp34 CI
#
# Pure-Rust library: no Python, no system libraries, no network services. So CI
# is just format + lint + test on stable. Clippy is NOT run with `-D warnings`
# on purpose — the crate's lint policy lives in `[lints.clippy]` in Cargo.toml
# (correctness denied; style/dead-code warn), and `cargo clippy` honours it.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features

      - name: Test
        run: cargo test --all-features

      # Keep the benchmarks compiling (they're not gated on machine-dependent
      # numbers, but they must not rot).
      - name: Benches compile
        run: cargo bench --no-run

      # The leak check is deterministic (counting allocator, tight budget) and
      # DOES gate — it guards the codec and bind/unbind session paths.
      - name: Memory-leak check
        run: cargo run --release --example leak_check
