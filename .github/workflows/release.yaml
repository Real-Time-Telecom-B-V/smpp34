# .github/workflows/release.yaml — publish to crates.io + GitHub Release on tag push.
#
# A pure-Rust library, so this is the minimal slice of a release pipeline:
#   * verify-version — the git tag is the single source of truth; refuse to
#     publish if Cargo.toml's version doesn't match the tag.
#   * crates-io      — publish via OIDC Trusted Publishing (no stored token).
#   * sbom           — SPDX + CycloneDX, attached to the release.
#   * github-release — notes + SBOMs.
# No Docker image and no binary tarball — there is no binary to ship.
#
# PREREQUISITE for the crates-io job: own `smpp34` on crates.io and configure
# Trusted Publishing (OIDC) on the crate, pointing at this repo + this workflow.
name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: read

jobs:
  verify-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Cargo version must equal the tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          cargo_version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/^version = "(.*)"/\1/')"
          echo "tag=$tag_version cargo=$cargo_version"
          if [ "$tag_version" != "$cargo_version" ]; then
            echo "::error::Cargo.toml version ($cargo_version) does not match tag ($tag_version) — bump version in the release commit."
            exit 1
          fi

  crates-io:
    needs: verify-version
    runs-on: ubuntu-latest
    permissions:
      id-token: write # mint a short-lived crates.io token via GitHub OIDC — no stored secret
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Authenticate to crates.io (OIDC Trusted Publishing)
        uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  sbom:
    needs: verify-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-sbom
        run: cargo install cargo-sbom
      - name: Generate SPDX + CycloneDX SBOMs
        run: |
          cargo sbom --output-format spdx_json_2_3 > "smpp34-${GITHUB_REF_NAME}.spdx.json"
          cargo sbom --output-format cyclone_dx_json_1_4 > "smpp34-${GITHUB_REF_NAME}.cdx.json"
      - uses: actions/upload-artifact@v7
        with:
          name: sbom
          path: |
            smpp34-*.spdx.json
            smpp34-*.cdx.json

  github-release:
    needs: [crates-io, sbom]
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the release and upload assets
    steps:
      - uses: actions/checkout@v7
      - name: Download SBOMs
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*.spdx.json
            artifacts/*.cdx.json
