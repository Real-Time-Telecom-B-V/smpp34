# cargo-deny — dependency-graph security / license / source policy for smpp34.
# Local: `cargo deny check`  ·  CI: .github/workflows/audit.yml
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[advisories]
# A yanked crate or an open RustSec advisory fails the audit.
version = 2
yanked = "deny"
ignore = []

[bans]
multiple-versions = "warn"
wildcards = "warn"
# NOTE: smpp34's TLS path uses tokio-native-tls, which links the system OpenSSL
# (a C library) via openssl-sys. This is intentional, so there is no C-FFI ban
# list here. (A future move to rustls would make a zero-C build possible.)

[licenses]
# The crate is MIT; keep dependencies OSI-permissive.
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "MPL-2.0",
]
confidence-threshold = 0.9

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
